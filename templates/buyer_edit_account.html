<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Account - Buyer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-store"></i> My Market Place</a>
            <a class="nav-link text-white" href="/buyer/dashboard">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <h4><i class="fas fa-user-edit"></i> Edit Your Profile</h4>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" enctype="multipart/form-data">
                            <div class="text-center mb-3">
                                {% if buyer[5] %}
                                    <img src="{{ buyer[5] }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%;" class="mb-2">
                                {% else %}
                                    <i class="fas fa-user-circle fa-4x text-muted mb-2"></i>
                                {% endif %}
                                <div class="mb-3">
                                    <label>Change Profile Picture</label>
                                    <input type="file" name="profile_pic" class="form-control" accept="image/*">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label>Full Name</label>
                                <input type="text" name="full_name" class="form-control" value="{{ buyer[1] }}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" class="form-control" value="{{ buyer[2] }}" disabled>
                                <small class="text-muted">Email cannot be changed</small>
                            </div>
                            
                            <div class="mb-3">
                                <label>Phone Number</label>
                                <input type="tel" name="phone" class="form-control" value="{{ buyer[3] }}">
                            </div>
                            
                            <button type="submit" class="btn btn-info w-100">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
