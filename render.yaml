services:
  - type: web
    name: my-market-place
    runtime: python
    repo: https://github.com/Mdav10/my-market-place
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
